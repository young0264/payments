services:
  mysql:
    image: mysql:8.0
    container_name: payments-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: payments
      TZ: Asia/Seoul
    volumes:
      - payments-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: payments-redis
    ports:
      - "6379:6379"

volumes:
  payments-mysql-data:
